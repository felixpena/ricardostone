<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --white:  #FFFFFF;
  --off:    #F8F7F4;
  --border: #DDD9CF;
  --ink:    #0C0C14;
  --muted:  #8A8680;
  --deep:   #1C3A5E;
  --gold:   #9B7B3A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--white);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.wrap { max-width: 820px; margin: 0 auto; padding: 0 32px; }

nav {
  padding: 26px 0;
  border-bottom: 1px solid var(--border);
  background: var(--white);
}
.nav-row { display: flex; justify-content: space-between; align-items: center; }
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 500; font-style: italic;
  color: var(--ink); text-decoration: none;
}
.brand span { color: var(--deep); }

.main {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 80px 0;
}
.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px;
}
.tag::before { content: ''; width: 20px; height: 1px; background: var(--gold); display: inline-block; }
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(42px, 5.5vw, 68px);
  font-weight: 500; line-height: 1.06;
  letter-spacing: -0.01em; margin-bottom: 24px;
}
h1 em { font-style: italic; color: var(--deep); }
.sub {
  font-size: 17px; color: var(--muted);
  line-height: 1.75; max-width: 480px; margin-bottom: 48px;
}
.sub strong { color: var(--ink); font-weight: 500; }
.back {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  color: var(--deep);
  text-decoration: none;
  border-bottom: 1px solid var(--deep);
  padding-bottom: 2px;
  transition: opacity .15s;
}
.back:hover { opacity: 0.6; }

footer {
  border-top: 1px solid var(--border);
  padding: 28px 0;
  background: var(--off);
}
.foot-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-style: italic; color: var(--muted);
}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="nav-row">
      <a href="/" class="brand">Ricardo <span>Stone</span></a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="wrap">
    <div class="tag">Solicitud recibida</div>
    <h1>Recibido.<br><em>Te escribo pronto.</em></h1>
    <p class="sub">
      Respondo en menos de <strong>48 horas</strong>.
      Todo lo que enviaste es estrictamente confidencial.
    </p>
    <a href="/" class="back">← Volver al inicio</a>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-brand">Ricardo Stone · Chile</div>
  </div>
</footer>

</body>
</html>
