<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg:     #0A0A0B;
  --off:    #0F0F11;
  --border: #222228;
  --ink:    #EDEAE4;
  --muted:  #6A6762;
  --gold:   #C4963A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.wrap { max-width: 960px; margin: 0 auto; padding: 0 40px; }

nav {
  padding: 24px 0;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,11,0.94);
  backdrop-filter: blur(12px);
}
.nav-row { display: flex; justify-content: space-between; align-items: center; }
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 500; font-style: italic;
  color: var(--ink); text-decoration: none;
}
.brand span { color: var(--gold); }

.main { flex: 1; display: flex; align-items: center; padding: 100px 0; }
.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px; opacity: 0.85;
}
.tag::before { content: ''; width: 20px; height: 1px; background: var(--gold); display: inline-block; }
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(42px, 5.5vw, 68px);
  font-weight: 500; line-height: 1.06;
  letter-spacing: -0.01em; margin-bottom: 24px;
}
h1 em { font-style: italic; color: var(--gold); }
.sub {
  font-size: 17px; color: var(--muted);
  line-height: 1.75; max-width: 480px; margin-bottom: 48px;
}
.sub strong { color: var(--ink); font-weight: 500; }
.back {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  color: var(--gold);
  text-decoration: none;
  border-bottom: 1px solid rgba(196,150,58,0.4);
  padding-bottom: 2px;
  transition: border-color .15s, opacity .15s;
}
.back:hover { border-bottom-color: var(--gold); opacity: 0.8; }

footer {
  border-top: 1px solid var(--border);
  background: var(--off);
  padding: 24px 0;
}
.foot-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-style: italic; color: var(--muted);
}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="nav-row">
      <a href="/" class="brand">Ricardo <span>Stone</span></a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="wrap">
    <div class="tag">Solicitud recibida</div>
    <h1>Recibido.<br><em>Te escribo pronto.</em></h1>
    <p class="sub">
      Respondo en menos de <strong>48 horas</strong>.
      Todo lo que enviaste es estrictamente confidencial.
    </p>
    <a href="/" class="back">← Volver al inicio</a>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-brand">Ricardo Stone · Chile</div>
  </div>
</footer>

</body>
</html>
